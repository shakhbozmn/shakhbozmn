# Refresh static hero GIFs manually

name: Refresh static hero GIFs

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-static-hero
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install monospace font + Pillow
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
          pip install --quiet --no-cache-dir 'Pillow>=10,<13'

      - name: Render static terminal GIFs
        run: python3 scripts/build-hero-gif.py --static-only

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          git commit -m "chore: refresh static hero GIFs"
          git push
