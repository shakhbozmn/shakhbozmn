name: Refresh hero GIFs

# Triggers:
#   schedule        — best-effort, every 5 min. Cron can fail silently.
#   workflow_dispatch — manual trigger via `gh workflow run`.
#   repository_dispatch — external cron (cron-job.org / UptimeRobot / etc.) hits
#     POST https://api.github.com/repos/shakhbozmn/shakhbozmn/dispatches
#     with `{"event_type": "tick"}`. Use this for true 1-min live clock.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [tick]

permissions:
  contents: write

concurrency:
  group: refresh-hero
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install monospace font + Pillow
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
          pip install --quiet --no-cache-dir 'Pillow>=10,<13'

      - name: Render hero GIFs + stamp README date
        # The Python script also rewrites DATE_PLACEHOLDER in README.md
        # with today's UTC+5 date so the "last transmission" line updates.
        run: python3 scripts/build-hero-gif.py

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/ README.md; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ README.md
          git commit -m "chore: refresh hero clock + last-transmission date ($(date -u +%FT%TZ))"
          git push
