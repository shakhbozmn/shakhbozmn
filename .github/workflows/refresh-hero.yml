name: Refresh hero GIFs

on:
  schedule:
    # Every 5 minutes — keeps the now-widget clock fresh on the README.
    # Cron parsed at every push to .github/workflows/refresh-hero.yml.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-hero
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install monospace font + Pillow
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu-core
          pip install --quiet --no-cache-dir 'Pillow>=10,<13'

      - name: Render hero GIFs
        run: python3 scripts/build-hero-gif.py

      - name: Commit changed GIFs
        run: |
          if git diff --quiet -- assets/; then
            echo "Hero GIFs unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          git commit -m "chore: refresh hero GIFs ($(date -u +%FT%TZ))"
          git push
