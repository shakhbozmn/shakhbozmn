name: Update flight recorder

on:
  schedule:
    - cron: '17 7 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-flight-recorder
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v7

      - name: Test updater
        run: node --test scripts/update-flight-recorder.test.mjs

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/update-flight-recorder.mjs

      - name: Commit changed flight recorder
        run: |
          if git diff --quiet -- README.md; then
            echo "Flight recorder unchanged"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update flight recorder"
          git push
