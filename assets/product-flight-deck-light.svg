<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" width="1200" height="420">
  <title>Product Flight Deck — Shahboz Munirov</title>
  <desc>Cinematic technical flight deck composition for Shahboz Munirov, Software Engineer and Product Engineer, featuring BUILD · CONNECT · OPERATE value line across Mobile + Web, Backend + Integrations, and Delivery Systems nodes.</desc>

  <defs>
    <style>
      @media (prefers-reduced-motion: reduce) {
        .telemetry-sweep { animation: none; }
        .status-pulse { animation: none; }
      }
    </style>
    <pattern id="grid-light" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#D8DEE4" stroke-width="0.5"/>
    </pattern>
    <clipPath id="panel-clip-light">
      <rect x="12" y="12" width="1176" height="396" rx="16"/>
    </clipPath>
    <linearGradient id="route-grad-light" x1="600" y1="78" x2="600" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0969DA" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0969DA" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="#F6F8FA"/>

  <!-- Outer panel -->
  <rect x="12" y="12" width="1176" height="396" rx="16" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>

  <!-- Grid (clipped to panel) -->
  <rect x="12" y="12" width="1176" height="396" rx="16" fill="url(#grid-light)" clip-path="url(#panel-clip-light)" opacity="0.7"/>

  <!-- Telemetry rail -->
  <rect x="12" y="12" width="1176" height="48" rx="16" fill="#0969DA" opacity="0.06"/>
  <rect x="12" y="44" width="1176" height="16" fill="#0969DA" opacity="0.06"/>
  <line x1="12" y1="60" x2="1212" y2="60" stroke="#0969DA" stroke-width="1.5" opacity="0.3"/>

  <text x="48" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#0969DA" letter-spacing="4" class="telemetry-sweep">PRODUCT FLIGHT DECK</text>
  <text x="1152" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#59636E" letter-spacing="1.5" text-anchor="end">TASHKENT · 41°N</text>

  <!-- Route line from coordinate to nodes -->
  <path d="M 600 78 C 600 140, 340 220, 340 300" fill="none" stroke="#0969DA" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <path d="M 600 78 C 600 160, 600 220, 600 300" fill="none" stroke="#0969DA" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>
  <path d="M 600 78 C 600 140, 860 220, 860 300" fill="none" stroke="#0969DA" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.5"/>

  <!-- Coordinate marker -->
  <circle cx="600" cy="78" r="5" fill="#0969DA" class="status-pulse"/>
  <circle cx="600" cy="78" r="3" fill="#FFFFFF"/>

  <!-- Primary signal -->
  <text x="600" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="800" fill="#1F2328" text-anchor="middle" letter-spacing="-1">SHAHBOZ MUNIROV</text>

  <!-- Role rail -->
  <text x="600" y="165" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="500" fill="#59636E" text-anchor="middle" letter-spacing="3">SOFTWARE ENGINEER / PRODUCT ENGINEER</text>

  <!-- Divider -->
  <line x1="480" y1="185" x2="720" y2="185" stroke="#D0D7DE" stroke-width="1" opacity="0.8"/>

  <!-- Value line -->
  <text x="600" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0969DA" text-anchor="middle" letter-spacing="6">BUILD · CONNECT · OPERATE</text>

  <!-- Node 1: MOBILE + WEB -->
  <circle cx="218" cy="274" r="4" fill="#0969DA" class="status-pulse"/>
  <rect x="200" y="282" width="260" height="80" rx="10" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
  <text x="330" y="317" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2328" text-anchor="middle" letter-spacing="0">MOBILE + WEB</text>
  <text x="330" y="344" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#59636E" text-anchor="middle" letter-spacing="0">PRODUCT SURFACES</text>

  <!-- Node 2: BACKEND + INTEGRATIONS -->
  <circle cx="518" cy="274" r="4" fill="#1A7F37" class="status-pulse"/>
  <rect x="500" y="282" width="260" height="80" rx="10" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
  <text x="630" y="317" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2328" text-anchor="middle" letter-spacing="0">BACKEND + INTEGRATIONS</text>
  <text x="630" y="344" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#59636E" text-anchor="middle" letter-spacing="0">APIs + DATA</text>

  <!-- Node 3: DELIVERY SYSTEMS -->
  <circle cx="818" cy="274" r="4" fill="#0969DA" class="status-pulse"/>
  <rect x="800" y="282" width="260" height="80" rx="10" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
  <text x="930" y="317" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2328" text-anchor="middle" letter-spacing="0">DELIVERY SYSTEMS</text>
  <text x="930" y="344" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="400" fill="#59636E" text-anchor="middle" letter-spacing="0">CI/CD + INFRA</text>

  <style>
    @keyframes telemetry-sweep {
      0% { transform: translateX(-200px); }
      100% { transform: translateX(1200px); }
    }
    .telemetry-sweep {
      animation: telemetry-sweep 8s linear infinite;
    }
    @keyframes status-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .status-pulse {
      animation: status-pulse 3s ease-in-out infinite;
    }
  </style>
</svg>
